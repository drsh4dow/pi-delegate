name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Full validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Lint and format check
        run: bun run check

      - name: Check package contents
        run: bun pm pack --dry-run

      - name: Smoke test Pi package load
        run: PI_OFFLINE=1 bunx pi --no-extensions -e . --list-models >/tmp/pi-delegate-pi-load.out

  live-eval:
    name: Live delegate KPI eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run live delegate eval
        env:
          PI_DELEGATE_EVAL_ARTIFACT_DIR: artifacts/live-eval
          PI_DELEGATE_EVAL_TIMEOUT_MS: ${{ vars.PI_DELEGATE_EVAL_TIMEOUT_MS || '1800000' }}
          PI_DELEGATE_EVAL_MAX_TOKENS: ${{ vars.PI_DELEGATE_EVAL_MAX_TOKENS || '1500000' }}
          PI_DELEGATE_EVAL_MAX_COST_USD: ${{ vars.PI_DELEGATE_EVAL_MAX_COST_USD || '30' }}
          PI_DELEGATE_EVAL_JUDGE_MODEL: ${{ vars.PI_DELEGATE_EVAL_JUDGE_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun run test:live

      - name: Upload live eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-delegate-eval
          path: artifacts/live-eval
          if-no-files-found: ignore
